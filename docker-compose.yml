version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: netx_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-netx}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Jakarta
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d netx"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netx_network

  redis:
    image: redis:7-alpine
    container_name: netx_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    environment:
      - TZ=Asia/Jakarta
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netx_network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: netx_api
    environment:
      - DB_ENGINE=${DB_ENGINE:-postgresql}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-netx}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - NETX_MODE=api
      - TZ=Asia/Jakarta
    # --- Linux Serial Console Access Settings (Uncomment if needed) ---
    # Option A: Quick but less secure (Gives container full root privileges to host hardware)
    # privileged: true
    # volumes:
    #   - /dev:/dev
    #
    # Option B: Secure (Recommended - Restricts container access to serial devices only)
    # device_cgroup_rules:
    #   - 'c 188:* rmw' # Allow USB-to-Serial devices (ttyUSB)
    #   - 'c 166:* rmw' # Allow USB-ACM modem devices (ttyACM)
    #   - 'c 4:* rmw'   # Allow standard serial ports (ttyS)
    # volumes:
    #   - /dev:/dev
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - netx_network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: netx_worker
    environment:
      - DB_ENGINE=${DB_ENGINE:-postgresql}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-netx}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - NETX_MODE=worker
      - MAX_CONCURRENT_SSH=20
      - TZ=Asia/Jakarta
    # --- Linux Serial Console Access Settings (Uncomment if needed) ---
    # Option A: Quick but less secure (Gives container full root privileges to host hardware)
    # privileged: true
    # volumes:
    #   - /dev:/dev
    #
    # Option B: Secure (Recommended - Restricts container access to serial devices only)
    # device_cgroup_rules:
    #   - 'c 188:* rmw' # Allow USB-to-Serial devices (ttyUSB)
    #   - 'c 166:* rmw' # Allow USB-ACM modem devices (ttyACM)
    #   - 'c 4:* rmw'   # Allow standard serial ports (ttyS)
    # volumes:
    #   - /dev:/dev
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - netx_network

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: netx_scheduler
    command: python main_scheduler.py
    environment:
      - DB_ENGINE=${DB_ENGINE:-postgresql}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-netx}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - TZ=Asia/Jakarta
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - netx_network

  syslog:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: netx_syslog
    command: python -m app.services.syslog_server
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - target: 514
        published: 514
        protocol: udp
        mode: host
    environment:
      - DB_ENGINE=${DB_ENGINE:-postgresql}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-netx}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - DB_SSL_MODE=disable
      - TZ=Asia/Jakarta
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - netx_network

  snmp_traps:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: netx_snmp_traps
    command: python -m app.services.snmp_trap_receiver
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - target: ${SNMP_TRAP_PORT:-162}
        published: ${SNMP_TRAP_PORT:-162}
        protocol: udp
        mode: host
    environment:
      - DB_ENGINE=${DB_ENGINE:-postgresql}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-netx}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - DB_SSL_MODE=disable
      - TZ=Asia/Jakarta
      - SNMP_TRAP_PORT=${SNMP_TRAP_PORT:-162}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - netx_network

volumes:
  pgdata:
  redisdata:

networks:
  netx_network:
    driver: bridge
